name: run-tests

on: push

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        # required for to compile srtm4
        run: sudo apt install -y libtiff-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Make sure the lockfile is up to date
        run: uv lock --check

      - name: Run mypy
        run: |
          uv run --all-extras mypy --non-interactive src/ tests/ usage/

      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        # required for to compile srtm4
        run: sudo apt install -y libtiff-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: |
          uv run --all-extras pytest . -n auto -v -m "not cdse"

