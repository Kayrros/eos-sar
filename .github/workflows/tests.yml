name: run-tests

on: [push, pull_request]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        # required for to compile srtm4
        run: sudo apt install -y libtiff-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Make sure the lockfile is up to date
        run: uv lock --check

      - name: Run mypy
        run: |
          uv run --all-extras mypy --non-interactive src/ tests/ usage/

      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        # required for to compile srtm4
        run: sudo apt install -y libtiff-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: |
          uv run --all-extras pytest . -n auto -v -m "not cdse"

  test-compatibility:
    name: test-compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        # required for to compile srtm4
        run: sudo apt install -y libtiff-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Test with lowest-direct resolution
        run: |
          export UV_RESOLUTION=lowest-direct
          rm uv.lock
          echo 3.10 >.python-version
          uv lock
          uv tree
          uv run --all-extras pytest . -n auto -v -m "not cdse"

  fakedeploy:
    name: fakedeploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Build the project
        run: uv build

      - name: Test the built package
        run: |
          uv venv --seed
          source .venv/bin/activate
          pip install dist/*.tar.gz
          pip install dist/*.whl
          python -c 'import eos.sar.io'
          python -c 'import eos.products.sentinel1.assembler'

      - name: Build with different python versions
        run: |
          uv build --python 3.10
          uv build --python 3.11
          uv build --python 3.12
          uv build --python 3.13
          uv build --python 3.14
