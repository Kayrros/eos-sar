default:
  # boto3 requires urllib3<2 for python 3.9
  #   https://github.com/boto/botocore/issues/3138
  # but types-requests requests >=2
  #   https://github.com/python/typeshed/blob/main/stubs/requests/METADATA.toml#L4
  # so for the CI we use 3.10
  # but eos-sar should stay compatible with 3.9 for a while
  image: python:3.10

stages:
  - test
  - deploy

variables:
  PIP_EXTRA_INDEX_URL: "https://pypi.dev-kayrros.ovh/"

test:
  stage: test
  tags:
    - high
  before_script:
    - pip install -r requirements-dev.txt -r requirements-dev.txt
    - pip install -e .
  script:
    - pytest . -n auto -v

checkstyle:
  stage: test
  before_script:
    - pip install $(grep ruff requirements-dev.txt)
  script:
    - ruff check .
    - ruff format --check .

mypy:
  stage: test
  before_script:
    - pip install -r requirements-dev.txt -r requirements-dev.txt
  script:
    - mypy --non-interactive eos/ teosar/ tests/ usage/

fakedeploy:
  stage: test
  before_script:
    - pip install twine
    - pip install cython numpy
  script:
    - python setup.py sdist
    - python setup.py bdist_wheel
    - pip install dist/*.tar.gz
    - pip install dist/*.whl

deploy-sdist:
  stage: deploy
  before_script:
    - pip install twine
    - pip install cython numpy
  script:
    - python setup.py sdist
    - twine upload
      --repository-url ${PIP_EXTRA_INDEX_URL}
      -u ${PYPI_USERNAME}
      -p ${PYPI_PASSWORD}
      dist/*
  only:
    - tags

