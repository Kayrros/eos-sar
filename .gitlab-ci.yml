default:
  image: ghcr.io/astral-sh/uv:0.7-bookworm

stages:
  - test

variables:
  # never use the python from the system, as it might lack development headers
  UV_MANAGED_PYTHON: "1"  

test:
  stage: test
  tags:
    - high
  script:
    - uv run --all-extras pytest . -n auto -v

# also test with a different resolution, to make sure everything works when using the oldest dependencies
test:compatibility:
  stage: test
  tags:
    - high
  script:
    - export UV_RESOLUTION=lowest-direct
    - rm uv.lock
    - echo 3.9 >.python-version
    - uv lock
    - uv tree
    - uv run --all-extras pytest . -n auto -v

lint:
  stage: test
  script:
    - uv run --all-extras mypy --non-interactive src/ tests/ usage/
    - uv run ruff check .
    - uv run ruff format --check .

fakedeploy:
  stage: test
  script:
    - uv build
    - uv venv --seed
    - source .venv/bin/activate
    - pip install dist/*.tar.gz
    - pip install dist/*.whl
    - python -c 'import eos.sar.io'
    - python -c 'import eos.products.sentinel1.assembler'
    # also be exhaustive:
    - uv build --python 3.9
    - uv build --python 3.10
    - uv build --python 3.11
    - uv build --python 3.12
    - uv build --python 3.13
